schema = "ailang.package-source.v1"
name = "target-macos"
version = "0.0.1-alpha.2"
types = ["target", "tool", "template"]

[targets.macos]
id = "macos"
description = "macOS application bundle target"
runtime = "aivm"
profile = "apple-desktop"
aliases = ["apple-macos", "darwin"]
defaultRunner = "run"
artifactTypes = ["app", "dir", "dmg"]
options = ["arch", "bundle-id", "signing-identity", "notarize"]

[targets.macos.tools]
run = []
publish = []
doctor = []
flash = []
